services:
  - type: web
    name: service-alpha
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SERVICE_NAME
        value: service-alpha
      - key: NODE_ENV
        value: production
        previewValue: development

  - type: web
    name: service-beta
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: SERVICE_NAME
        value: service-beta
      - key: NODE_ENV
        value: production
        previewValue: development

previews:
  generation: automatic
  expireAfterDays: 7
